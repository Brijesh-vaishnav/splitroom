<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splitroom — Room</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .split-selector-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; display: block; }
    .split-members { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
    .split-member-opt {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer; transition: border-color 0.15s;
    }
    .split-member-opt:hover { border-color: var(--border2); }
    .split-member-opt.selected { border-color: var(--accent); background: var(--accent-light); }
    .split-member-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .split-check { margin-left: auto; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .split-member-opt.selected .split-check { background: var(--accent); border-color: var(--accent); }
    .split-preview { font-size: 12px; color: var(--text3); min-height: 18px; }
    .split-preview span { color: #818cf8; font-weight: 500; }
    .payment-actions { display: flex; gap: 6px; }
    .edit-payment { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 5px; }
    .edit-payment:hover { color: var(--accent); background: var(--accent-light); }
    .member-remove { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 5px; margin-left: auto; }
    .member-remove:hover { color: var(--red); background: var(--red-light); }
    .manage-btn { font-size: 12px; color: var(--text3); background: none; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 3px 10px; cursor: pointer; margin-top: 10px; width: 100%; }
    .manage-btn:hover { background: var(--bg3); color: var(--text); }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <a href="/dashboard.html" style="color:var(--text2);font-size:13px;display:flex;align-items:center;gap:6px;text-decoration:none;">← Back</a>
  </div>
  <div class="navbar-right">
    <span class="nav-username" id="nav-username"></span>
    <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Sign out</button>
  </div>
</nav>

<div class="container-wide" id="page-content">
  <div class="loading-screen"><span class="spinner"></span></div>
</div>

<!-- Add/Edit payment modal -->
<div class="modal-backdrop" id="add-payment-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="payment-modal-title">Add payment</span>
      <button class="modal-close" onclick="closeModal('add-payment-modal')">×</button>
    </div>
    <div id="payment-alert" class="alert"></div>
    <div class="type-selector" id="type-selector-wrap">
      <label class="type-option selected" id="opt-recurring">
        <input type="radio" name="ptype" value="recurring" checked onchange="selectType('recurring')" />
        <span class="type-option-label">Recurring</span>
        <span class="type-option-desc">Monthly bill</span>
      </label>
      <label class="type-option" id="opt-onetime">
        <input type="radio" name="ptype" value="one-time" onchange="selectType('one-time')" />
        <span class="type-option-label">One-time</span>
        <span class="type-option-desc">Single expense</span>
      </label>
    </div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" type="text" id="pay-title" placeholder="e.g. Netflix, Dinner" />
    </div>
    <div class="form-group">
      <label class="form-label">Total amount (₹)</label>
      <input class="form-input" type="number" id="pay-amount" placeholder="0" min="1" oninput="updateSplitPreview()" />
    </div>
    <div class="form-group">
      <span class="split-selector-label">Split with</span>
      <div class="split-members" id="split-members-list"></div>
      <div class="split-preview" id="split-preview"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;">
      <button class="btn btn-secondary" onclick="closeModal('add-payment-modal')">Cancel</button>
      <button class="btn btn-primary" id="add-pay-btn" onclick="handleSavePayment()">Add payment</button>
    </div>
  </div>
</div>

<!-- Manage members modal -->
<div class="modal-backdrop" id="members-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Manage members</span>
      <button class="modal-close" onclick="closeModal('members-modal')">×</button>
    </div>
    <div id="members-alert" class="alert"></div>

    <div class="section-label" style="margin-bottom:8px;">Current members</div>
    <div id="manage-members-list" style="margin-bottom:1.25rem;"></div>

    <hr class="divider" />

    <div class="section-label" style="margin-bottom:8px;">Add member by username</div>
    <div style="display:flex;gap:8px;">
      <input class="form-input" type="text" id="add-member-username" placeholder="username" style="flex:1;" />
      <button class="btn btn-primary" id="add-member-btn" onclick="handleAddMember()">Add</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  let currentUser = null;
  let currentProfile = null;
  let room = null;
  let members = [];
  let payments = [];
  let paymentLogs = [];
  let activeTab = 'recurring';
  let selectedSplitMembers = [];
  let editingPaymentId = null;
  let pollInterval = null;

  const roomId = new URLSearchParams(window.location.search).get('id');
  if (!roomId) window.location.href = '/dashboard.html';

  async function init() {
    currentUser = await requireAuth();
    if (!currentUser) return;
    currentProfile = await getProfile(currentUser.id);
    document.getElementById('nav-username').textContent = '@' + (currentProfile?.username || '');
    await loadRoom();
    pollInterval = setInterval(loadRoom, 10000);
  }

  async function loadRoom() {
    const { data: roomData } = await db.rpc('get_room_data', { rid: roomId });
    if (!roomData) { window.location.href = '/dashboard.html'; return; }
    const parsed = typeof roomData === 'string' ? JSON.parse(roomData) : roomData;
    if (!parsed || parsed.error) { window.location.href = '/dashboard.html'; return; }
    room = parsed.room;
    members = parsed.members || [];

    const { data: pays } = await db.from('payments')
      .select('*').eq('room_id', roomId).order('created_at', { ascending: false });
    payments = pays || [];

    if (payments.length > 0) {
      const { data: logs } = await db.rpc('get_payment_logs', { rid: roomId });
      paymentLogs = logs ? (typeof logs === 'string' ? JSON.parse(logs) : logs) : [];
    } else {
      paymentLogs = [];
    }
    renderPage();
  }

  function renderPage() {
    if (!room) return;
    document.title = `${room.name} — Splitroom`;
    const isOwner = room.created_by === currentUser.id;
    const filtered = payments.filter(p =>
      activeTab === 'recurring' ? p.type === 'recurring' : p.type === 'one-time'
    );
    document.getElementById('page-content').innerHTML = `
      <div class="room-header">
        <div class="room-header-top">
          <div class="room-name">${escHtml(room.name)}</div>
          <button class="btn btn-primary btn-sm" onclick="openAddPayment()">+ Add payment</button>
        </div>
        <div class="room-meta">
          <div class="room-invite" onclick="copyCode()" title="Click to copy">
            <span class="room-invite-label">Invite code</span>
            <code>${room.invite_code}</code>
            <span style="font-size:12px;color:var(--text3);">copy</span>
          </div>
          <span style="font-size:12px;color:var(--text3);">${members.length} member${members.length !== 1 ? 's' : ''}</span>
        </div>
      </div>
      <div class="room-body">
        <div>
          <div class="tabs">
            <button class="tab-btn ${activeTab === 'recurring' ? 'active' : ''}" onclick="switchTab('recurring')">Recurring</button>
            <button class="tab-btn ${activeTab === 'one-time' ? 'active' : ''}" onclick="switchTab('one-time')">One-time</button>
          </div>
          ${filtered.length === 0
            ? `<div class="empty-state" style="padding:2rem 0;"><p>No ${activeTab} payments yet.</p></div>`
            : filtered.map(p => renderPayment(p)).join('')}
        </div>
        <div>
          <div class="section-label">Members</div>
          <div class="members-list">
            ${members.map(m => `
              <div class="member-item">
                <div class="avatar-sm">${initials(m.profiles.username)}</div>
                <span style="font-size:13px;">@${escHtml(m.profiles.username)}</span>
                ${m.user_id === currentUser.id ? '<span class="member-you">you</span>' : ''}
              </div>`).join('')}
          </div>
          <button class="manage-btn" onclick="openMembersModal()">
            ${isOwner ? '+ Manage members' : '+ Add members'}
          </button>
        </div>
      </div>`;
  }

  function renderPayment(p) {
    const splitWith = p.split_members && p.split_members.length > 0 ? p.split_members : members.map(m => m.user_id);
    const splitMembers = members.filter(m => splitWith.includes(m.user_id));
    const per = splitMembers.length > 0 ? Math.round(p.amount / splitMembers.length) : p.amount;
    const month = p.type === 'recurring' ? currentMonth() : null;
    const canEdit = p.created_by === currentUser.id;

    const memberRows = splitMembers.map(m => {
      const log = paymentLogs.find(l =>
        l.payment_id === p.id && l.user_id === m.user_id &&
        (p.type === 'one-time' || l.month === month)
      );
      const isPaid = log?.paid || false;
      const isMe = m.user_id === currentUser.id;
      return `
        <div class="member-row">
          <div class="member-row-left">
            <div class="avatar-sm">${initials(m.profiles.username)}</div>
            <span>@${escHtml(m.profiles.username)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="payment-per">${formatAmount(per)}</span>
            ${isMe
              ? `<button class="pay-toggle ${isPaid ? 'paid' : ''}"
                  onclick="togglePaid('${p.id}','${m.user_id}',${isPaid},'${p.type === 'recurring' ? month : ''}')">
                  ${isPaid ? '✓ Paid' : 'Mark paid'}
                </button>`
              : `<span class="badge ${isPaid ? 'badge-paid' : 'badge-unpaid'}">${isPaid ? 'Paid' : 'Pending'}</span>`}
          </div>
        </div>`;
    }).join('');

    const allPaid = splitMembers.length > 0 && splitMembers.every(m => {
      const log = paymentLogs.find(l =>
        l.payment_id === p.id && l.user_id === m.user_id &&
        (p.type === 'one-time' || l.month === month)
      );
      return log?.paid;
    });

    return `
      <div class="payment-item">
        <div class="payment-top">
          <div>
            <div class="payment-title">${escHtml(p.title)}</div>
            <div class="payment-meta">
              <span class="badge badge-${p.type === 'recurring' ? 'recurring' : 'onetime'}">
                ${p.type === 'recurring' ? 'Monthly' : 'One-time'}
              </span>
              ${allPaid ? '<span class="badge badge-paid">All paid</span>' : ''}
              ${p.type === 'recurring' ? `<span style="font-size:11px;color:var(--text3);">${month}</span>` : ''}
              <span style="font-size:11px;color:var(--text3);">÷ ${splitMembers.length}</span>
            </div>
          </div>
          <div class="payment-actions">
            <span class="payment-amount">${formatAmount(p.amount)}</span>
            ${canEdit ? `<button class="edit-payment" onclick="openEditPayment('${p.id}')" title="Edit">✎</button>` : ''}
            ${canEdit ? `<button class="delete-payment" onclick="deletePayment('${p.id}')" title="Delete">×</button>` : ''}
          </div>
        </div>
        <div class="payment-members">${memberRows}</div>
      </div>`;
  }

  async function togglePaid(paymentId, userId, currentlyPaid, month) {
    const newPaid = !currentlyPaid;
    const logData = { payment_id: paymentId, user_id: userId, paid: newPaid, paid_at: newPaid ? new Date().toISOString() : null, month: month || null };
    let query = db.from('payment_logs').select('id').eq('payment_id', paymentId).eq('user_id', userId);
    if (month) query = query.eq('month', month);
    else query = query.is('month', null);
    const { data: existing } = await query.maybeSingle();
    if (existing) {
      await db.from('payment_logs').update({ paid: newPaid, paid_at: logData.paid_at }).eq('id', existing.id);
      const idx = paymentLogs.findIndex(l => l.id === existing.id);
      if (idx !== -1) paymentLogs[idx] = { ...paymentLogs[idx], ...logData, id: existing.id };
    } else {
      const { data: newLog } = await db.from('payment_logs').insert(logData).select().maybeSingle();
      if (newLog) paymentLogs.push(newLog);
    }
    renderPage();
  }

  async function deletePayment(paymentId) {
    if (!confirm('Delete this payment?')) return;
    await db.from('payments').delete().eq('id', paymentId);
    payments = payments.filter(p => p.id !== paymentId);
    paymentLogs = paymentLogs.filter(l => l.payment_id !== paymentId);
    renderPage();
  }

  // ---- Add / Edit payment ----

  function openAddPayment() {
    editingPaymentId = null;
    document.getElementById('payment-modal-title').textContent = 'Add payment';
    document.getElementById('add-pay-btn').textContent = 'Add payment';
    document.getElementById('pay-title').value = '';
    document.getElementById('pay-amount').value = '';
    document.getElementById('payment-alert').classList.remove('show');
    document.getElementById('type-selector-wrap').style.display = 'grid';
    selectType('recurring');
    document.querySelector('input[name="ptype"][value="recurring"]').checked = true;
    selectedSplitMembers = members.map(m => m.user_id);
    renderSplitSelector();
    document.getElementById('add-payment-modal').classList.add('show');
    setTimeout(() => document.getElementById('pay-title').focus(), 100);
  }

  function openEditPayment(paymentId) {
    const p = payments.find(x => x.id === paymentId);
    if (!p) return;
    editingPaymentId = paymentId;
    document.getElementById('payment-modal-title').textContent = 'Edit payment';
    document.getElementById('add-pay-btn').textContent = 'Save changes';
    document.getElementById('pay-title').value = p.title;
    document.getElementById('pay-amount').value = p.amount;
    document.getElementById('payment-alert').classList.remove('show');
    // Hide type selector when editing (can't change type)
    document.getElementById('type-selector-wrap').style.display = 'none';
    selectedSplitMembers = p.split_members && p.split_members.length > 0
      ? p.split_members : members.map(m => m.user_id);
    renderSplitSelector();
    document.getElementById('add-payment-modal').classList.add('show');
    setTimeout(() => document.getElementById('pay-title').focus(), 100);
  }

  async function handleSavePayment() {
    const title = document.getElementById('pay-title').value.trim();
    const amount = parseFloat(document.getElementById('pay-amount').value);
    const alertEl = document.getElementById('payment-alert');
    const btn = document.getElementById('add-pay-btn');
    if (!title) return showAlert(alertEl, 'Please enter a title.');
    if (!amount || amount <= 0) return showAlert(alertEl, 'Please enter a valid amount.');
    if (selectedSplitMembers.length === 0) return showAlert(alertEl, 'Select at least one person.');

    setLoading(btn, true, editingPaymentId ? 'Save changes' : 'Add payment');

    if (editingPaymentId) {
      // Update existing
      const { error } = await db.from('payments')
        .update({ title, amount, split_members: selectedSplitMembers })
        .eq('id', editingPaymentId);
      if (error) {
        showAlert(alertEl, 'Failed to update. Try again.');
        setLoading(btn, false, 'Save changes');
        return;
      }
      const idx = payments.findIndex(p => p.id === editingPaymentId);
      if (idx !== -1) payments[idx] = { ...payments[idx], title, amount, split_members: selectedSplitMembers };
    } else {
      // Insert new
      const type = document.querySelector('input[name="ptype"]:checked').value;
      const { data: payment, error } = await db.from('payments').insert({
        room_id: roomId, title, type, amount,
        created_by: currentUser.id, split_members: selectedSplitMembers
      }).select().maybeSingle();
      if (error) {
        showAlert(alertEl, 'Failed to add payment. Try again.');
        setLoading(btn, false, 'Add payment');
        return;
      }
      payments.unshift(payment);
      activeTab = type === 'recurring' ? 'recurring' : 'one-time';
    }

    closeModal('add-payment-modal');
    renderPage();
  }

  // ---- Manage members ----

  function openMembersModal() {
    document.getElementById('members-alert').classList.remove('show');
    document.getElementById('add-member-username').value = '';
    renderManageMembers();
    document.getElementById('members-modal').classList.add('show');
  }

  function renderManageMembers() {
    const list = document.getElementById('manage-members-list');
    if (!list) return;
    const isOwner = room.created_by === currentUser.id;
    list.innerHTML = members.map(m => `
      <div class="member-item" style="margin-bottom:8px;">
        <div class="avatar-sm">${initials(m.profiles.username)}</div>
        <span style="font-size:13px;">@${escHtml(m.profiles.username)}</span>
        ${m.user_id === currentUser.id ? '<span class="member-you">you</span>' : ''}
        ${isOwner && m.user_id !== currentUser.id
          ? `<button class="member-remove" onclick="handleRemoveMember('${m.user_id}', '${escHtml(m.profiles.username)}')" title="Remove">×</button>`
          : ''}
      </div>`).join('');
  }

  async function handleAddMember() {
    const username = document.getElementById('add-member-username').value.trim().toLowerCase();
    const alertEl = document.getElementById('members-alert');
    const btn = document.getElementById('add-member-btn');
    if (!username) return showAlert(alertEl, 'Enter a username.');

    setLoading(btn, true, 'Add');

    // Find user by username
    const { data: profile } = await db.from('profiles').select('id, username').eq('username', username).maybeSingle();
    if (!profile) {
      showAlert(alertEl, `User @${username} not found.`);
      setLoading(btn, false, 'Add');
      return;
    }

    // Check already a member
    const alreadyMember = members.some(m => m.user_id === profile.id);
    if (alreadyMember) {
      showAlert(alertEl, `@${username} is already in this room.`);
      setLoading(btn, false, 'Add');
      return;
    }

    // Add via RPC
    const { error } = await db.from('room_members').insert({ room_id: roomId, user_id: profile.id });
    if (error) {
      // Try via RPC if direct insert fails
      await db.rpc('add_room_member', { rid: roomId, target_user_id: profile.id });
    }

    showAlert(alertEl, `@${username} added!`, 'success');
    setLoading(btn, false, 'Add');
    document.getElementById('add-member-username').value = '';
    await loadRoom();
    renderManageMembers();
  }

  async function handleRemoveMember(userId, username) {
    if (!confirm(`Remove @${username} from this room?`)) return;
    await db.rpc('remove_room_member', { rid: roomId, target_user_id: userId });
    await loadRoom();
    renderManageMembers();
  }

  // ---- Split selector ----

  function renderSplitSelector() {
    const list = document.getElementById('split-members-list');
    if (!list) return;
    list.innerHTML = members.map(m => {
      const isSelected = selectedSplitMembers.includes(m.user_id);
      const isMe = m.user_id === currentUser.id;
      return `
        <div class="split-member-opt ${isSelected ? 'selected' : ''}" onclick="toggleSplitMember('${m.user_id}')">
          <div class="avatar-sm">${initials(m.profiles.username)}</div>
          <span class="split-member-name">@${escHtml(m.profiles.username)}${isMe ? ' (you)' : ''}</span>
          <div class="split-check">
            ${isSelected ? '<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>' : ''}
          </div>
        </div>`;
    }).join('');
    updateSplitPreview();
  }

  function toggleSplitMember(userId) {
    if (selectedSplitMembers.includes(userId)) {
      if (selectedSplitMembers.length === 1) return;
      selectedSplitMembers = selectedSplitMembers.filter(id => id !== userId);
    } else {
      selectedSplitMembers.push(userId);
    }
    renderSplitSelector();
  }

  function updateSplitPreview() {
    const preview = document.getElementById('split-preview');
    if (!preview) return;
    const amount = parseFloat(document.getElementById('pay-amount')?.value) || 0;
    const count = selectedSplitMembers.length;
    preview.innerHTML = amount > 0 && count > 0
      ? `Each pays <span>₹${Math.round(amount / count)}</span> (${count} ${count === 1 ? 'person' : 'people'})`
      : '';
  }

  function selectType(t) {
    document.getElementById('opt-recurring').classList.toggle('selected', t === 'recurring');
    document.getElementById('opt-onetime').classList.toggle('selected', t === 'one-time');
  }

  function switchTab(tab) { activeTab = tab; renderPage(); }
  function closeModal(id) { document.getElementById(id).classList.remove('show'); }

  async function copyCode() {
    try {
      await navigator.clipboard.writeText(room.invite_code);
      const el = document.querySelector('.room-invite span:last-child');
      el.textContent = 'copied!'; el.style.color = 'var(--green)';
      setTimeout(() => { el.textContent = 'copy'; el.style.color = ''; }, 2000);
    } catch(e) {}
  }

  async function handleLogout() {
    clearInterval(pollInterval);
    await db.auth.signOut();
    window.location.href = '/index.html';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.querySelectorAll('.modal-backdrop').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); });
  });

  init();
</script>
</body>
</html>
